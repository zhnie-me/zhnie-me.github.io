        <h2 id="welcome-to-scrapy"><a href="#welcome-to-scrapy" class="headerlink" title="welcome to scrapy!!!"></a>welcome to scrapy!!!</h2><p>这是一段简单的爬虫</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br></pre></td><td class="code"><pre><span class="line">import scrapy   <span class="comment">#导入</span></span><br><span class="line">import json     <span class="comment">#josn转换</span></span><br><span class="line">import requests <span class="comment">#请求</span></span><br><span class="line">from bs4 import BeautifulSoup <span class="comment">#从网页抓取数据</span></span><br><span class="line">import re</span><br><span class="line"></span><br><span class="line"><span class="comment"># 外面的    </span></span><br><span class="line">name_list = []</span><br><span class="line">aear_list = []</span><br><span class="line">num_list = []</span><br><span class="line">num_time_list = []</span><br><span class="line">person_time_list = []</span><br><span class="line">tel_time_list = []</span><br><span class="line"></span><br><span class="line">str_url = []</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">def requests_post():</span><br><span class="line">    <span class="comment"># 定义请求头，防止找不到该网页</span></span><br><span class="line">    headers = &#123;</span><br><span class="line">        <span class="string">&#x27;User-Agent&#x27;</span>:<span class="string">&#x27;&#x27;</span></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 该网页的url</span></span><br><span class="line">    url = <span class="string">&#x27;&#x27;</span></span><br><span class="line">    page = input(<span class="string">&#x27;页数:&#x27;</span>)</span><br><span class="line">    <span class="built_in">print</span>(page)</span><br><span class="line"></span><br><span class="line">    payload = &#123;</span><br><span class="line">        <span class="string">&#x27;canshu1&#x27;</span>: 1,</span><br><span class="line">        <span class="string">&#x27;canshu2&#x27;</span>:<span class="string">&#x27;&#x27;</span>,</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="built_in">return</span> headers,url,page,payload</span><br><span class="line"></span><br><span class="line">def main():</span><br><span class="line">    list_post = requests_post()</span><br><span class="line">    url = list_post[1]</span><br><span class="line">    headers = list_post[0]</span><br><span class="line">    payload = list_post[3] </span><br><span class="line">    page = list_post[2]</span><br><span class="line">    <span class="keyword">for</span> p <span class="keyword">in</span> range(int(page)):</span><br><span class="line">        <span class="comment"># post()在消息主体中发送所以要加data=payload</span></span><br><span class="line">        <span class="comment"># get() 在请求的url中发送不用加  get(url ,herders=headers) url = 每个页面相同的部分+不同的部分</span></span><br><span class="line">        <span class="comment"># 这里用的是 post()</span></span><br><span class="line">        r = requests.post(url, headers=headers ,data=payload)</span><br><span class="line">        r.encoding = <span class="string">&#x27;utf-8&#x27;</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 用BeautifulSoup 解析网页抓取数据</span></span><br><span class="line">        soup = BeautifulSoup(r.text, <span class="string">&#x27;html.parser&#x27;</span>)</span><br><span class="line"></span><br><span class="line">        <span class="comment"># “tr” 爬取的对应节点</span></span><br><span class="line">        <span class="comment"># “class_” 爬取对应节点的class</span></span><br><span class="line">        <span class="comment"># “id”  爬取对应节点的id</span></span><br><span class="line">        soup_tr = soup(<span class="string">&quot;tr&quot;</span>,class_=<span class="string">&quot;ItemStyle&quot;</span>)</span><br><span class="line">        <span class="keyword">for</span> tr <span class="keyword">in</span> soup_tr:</span><br><span class="line">            <span class="comment"># url</span></span><br><span class="line">            str_url.append(tr.contents[1].a[<span class="string">&#x27;href&#x27;</span>]);</span><br><span class="line">            <span class="comment"># tr td</span></span><br><span class="line">            <span class="comment"># print(tr.contents[1].text.replace(&quot; &quot;, &quot;&quot;).replace(&quot;\n&quot;, &quot;&quot;))</span></span><br><span class="line">            <span class="comment"># print(tr.contents[2].text.replace(&quot; &quot;, &quot;&quot;).replace(&quot;\n&quot;, &quot;&quot;))</span></span><br><span class="line">            <span class="comment"># print(tr.contents[3].text.replace(&quot; &quot;, &quot;&quot;).replace(&quot;\n&quot;, &quot;&quot;))</span></span><br><span class="line">            <span class="comment"># print(tr.contents[4].text.replace(&quot; &quot;, &quot;&quot;).replace(&quot;\n&quot;, &quot;&quot;))</span></span><br><span class="line">            <span class="comment"># print(tr.contents[5].text.replace(&quot; &quot;, &quot;&quot;).replace(&quot;\n&quot;, &quot;&quot;))</span></span><br><span class="line">            <span class="comment"># print(tr.contents[6].text.replace(&quot; &quot;, &quot;&quot;).replace(&quot;\n&quot;, &quot;&quot;))</span></span><br><span class="line">            <span class="built_in">print</span>()</span><br><span class="line">        <span class="comment"># 跟换页面</span></span><br><span class="line">        payload[<span class="string">&#x27;canshu1&#x27;</span>] += 1</span><br><span class="line"><span class="comment"># 执行</span></span><br><span class="line">main()</span><br></pre></td></tr></table></figure>
