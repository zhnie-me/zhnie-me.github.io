        <h3 id="Welcome-to-io-java"><a href="#Welcome-to-io-java" class="headerlink" title="Welcome to io  (java)"></a>Welcome to io  (java)</h3><p>根据需要导入相应的文件包</p>
<h2 id="1-学会创建文件"><a href="#1-学会创建文件" class="headerlink" title="1.学会创建文件"></a>1.学会创建文件</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">File file = new File(<span class="string">&quot;c:/2.txt&quot;</span>); <span class="comment"># 括号里是文件路径</span></span><br><span class="line">	file.createNewFile();</span><br><span class="line">    file.mkdir(); <span class="comment"># 创建文件夹代码</span></span><br><span class="line"></span><br><span class="line"><span class="comment">## 创建文件</span></span><br><span class="line">FileOutputStream fileOutputStream = new FileOutputStream(<span class="string">&quot;c:/1.txt&quot;</span>);</span><br><span class="line">fileOutputStream.write(<span class="string">&quot;hahaha&quot;</span>.getBytes()); <span class="comment"># 将hahaha作为数组对象写进1.txt文件</span></span><br></pre></td></tr></table></figure>
<h2 id="2-利用io将文件快速传输（复制文件）"><a href="#2-利用io将文件快速传输（复制文件）" class="headerlink" title="2.利用io将文件快速传输（复制文件）"></a>2.利用io将文件快速传输（复制文件）</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">## 复制文件</span></span><br><span class="line">FileInputStream fileInputStream = new FileInputStream(<span class="string">&quot;c:/1.txt&quot;</span>); <span class="comment"># 文件路径</span></span><br><span class="line">FileOutputStream fileOutputStream = new FileOutputStream(<span class="string">&quot;c:/1.txt&quot;</span>); <span class="comment"># 文件路径+被定义的文件名</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 放进一个byte的数组里面，传输更快，内容更完整</span></span><br><span class="line">byte[] data= new byte[1024]; </span><br><span class="line">int len;</span><br><span class="line"><span class="keyword">while</span>( (len=fileInputStream.read(data) )!=-1 )&#123;</span><br><span class="line">	fileOutputStream.write(data, 0, len);</span><br><span class="line">		  </span><br><span class="line">	&#125;</span><br><span class="line"><span class="comment"># 关闭</span></span><br><span class="line">fileInputStream.close();</span><br><span class="line">fileOutputStream.close();</span><br><span class="line"></span><br></pre></td></tr></table></figure>
<h2 id="3-将1-txt内容变到-String-a"><a href="#3-将1-txt内容变到-String-a" class="headerlink" title="3.将1.txt内容变到  String a"></a>3.将1.txt内容变到  String a</h2><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 还是先创建文件</span></span><br><span class="line">FileInputStream fileInputStream = new  FileInputStream(<span class="string">&quot;c:/1.txt&quot;</span>);</span><br><span class="line">int len = fileInputStream.available(); <span class="comment"># 通过文件描述符获取文件的总大小</span></span><br><span class="line">	  </span><br><span class="line">byte[] data =new byte[len];</span><br><span class="line">fileInputStream.read(data);</span><br><span class="line">	  </span><br><span class="line">String a = new String(data);</span><br><span class="line">System.out.println(a);</span><br></pre></td></tr></table></figure>
